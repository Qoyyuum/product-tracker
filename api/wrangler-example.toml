name = "product-tracker-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "product-tracker-db"
database_id = "YOUR_DATABASE_ID"  # Replace after creating D1 database

# R2 Storage
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "product-tracker-storage"

# KV Namespace
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_ID"  # Replace after creating KV namespace

# Environment variables
[vars]
ENVIRONMENT = "production"

# Secrets (set with: wrangler secret put SECRET_NAME)
# JWT_SECRET
# ADMIN_API_KEY
